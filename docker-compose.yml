version: "3.8"
services:
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: ./api
    environment:
      - API_KEY=${API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - JOB_DIR=/app/jobs
      - SYNC_ROW_LIMIT=20
      - SLACK_INCOMING_WEBHOOK=${SLACK_INCOMING_WEBHOOK:-}
      - REPODIFF_PUBLIC_URL=${REPODIFF_PUBLIC_URL:-}
      - SHARE_SECRET=${SHARE_SECRET:-}
    ports:
      - "8000:8000"
    volumes:
      - ./jobs:/app/jobs
    depends_on:
      - redis

  slackbot:
    build:
      context: .
      dockerfile: bots/slack/Dockerfile.slack
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - REPODIFF_API_URL=http://api:8000
      - REPODIFF_API_KEY=${API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      - api

  discordbot:
    build:
      context: .
      dockerfile: bots/discord/Dockerfile.discord
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - REPODIFF_API_URL=http://api:8000
      - REPODIFF_API_KEY=${API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      - api

  teamsbot:
    build:
      context: .
      dockerfile: bots/teams/Dockerfile.teams
    environment:
      - MICROSOFT_APP_ID=${MICROSOFT_APP_ID}
      - MICROSOFT_APP_PASSWORD=${MICROSOFT_APP_PASSWORD}
      - REPODIFF_API_URL=http://api:8000
      - REPODIFF_API_KEY=${API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      - api
